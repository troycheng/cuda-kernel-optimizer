name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Project tests
        run: python -m unittest discover -s tests -p 'test_*.py'
      - name: Installed-skill tests
        run: python -m unittest discover -s skills/cuda-kernel-optimizer/tests -p 'test_*.py'
      - name: Compile Python sources
        run: python -m compileall -q skills/cuda-kernel-optimizer/scripts tests
      - name: Skill self-check
        run: python skills/cuda-kernel-optimizer/scripts/self_check.py
