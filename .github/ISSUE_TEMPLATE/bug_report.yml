name: Bug report
description: Report reproducible incorrect behavior
title: "[Bug] "
labels: [bug]
body:
  - type: textarea
    id: behavior
    attributes:
      label: What happened?
      description: Include the expected result and the actual result.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: How can it be reproduced?
      description: Provide the smallest safe workload, command, or fixture that reproduces it.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Python, framework, CUDA, driver, GPU, and profiler versions when relevant.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Logs or evidence
      description: Remove credentials and private workload data before attaching files.
